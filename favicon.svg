<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
    <!-- Gradient for Background -->
    <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3b82f6" />
            <stop offset="100%" stop-color="#1e3a8a" />
        </linearGradient>
        <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fef08a" />
            <stop offset="100%" stop-color="#f59e0b" />
        </linearGradient>
        <filter id="shadow">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.3"/>
        </filter>
    </defs>
    
    <!-- Background Square with rounded corners -->
    <rect width="120" height="120" rx="30" fill="url(#bgGrad)" />
    
    <!-- Sun shape -->
    <circle cx="85" cy="40" r="22" fill="url(#sunGrad)" filter="url(#shadow)" />
    
    <!-- Cloud shape drawn with paths -->
    <path d="M 40 85 
             C 25 85, 20 70, 32 60 
             C 40 45, 60 40, 70 52 
             C 85 45, 105 55, 100 70 
             C 105 85, 95 85, 90 85 
             Z" 
          fill="#ffffff" filter="url(#shadow)" />
          
    <path d="M 35 85 
             C 20 85, 15 70, 27 60 
             C 35 45, 55 40, 65 52 
             C 80 45, 100 55, 95 70 
             C 100 85, 90 85, 85 85 
             Z" 
          fill="#ffffff" />
          
    <!-- KW Initials (Koustav Weather) -->
    <text x="60" y="77" font-family="'Inter', Arial, sans-serif" font-size="34" font-weight="900" fill="#1e3a8a" text-anchor="middle" letter-spacing="-1">KW</text>
</svg>
